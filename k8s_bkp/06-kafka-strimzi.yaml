# Requires the Strimzi operator to already be installed in the cluster
# (kubectl create namespace kafka && kubectl apply -f strimzi-install.yaml -n kafka)
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: fintrack
  namespace: fintrack
spec:
  kafka:
    version: 3.8.0
    replicas: 1
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
    storage:
      type: jbod
      volumes:
        - id: 0
          type: persistent-claim
          size: 5Gi
          storageClass: manual
          deleteClaim: false
  zookeeper:
    replicas: 1
    storage:
      type: persistent-claim
      size: 2Gi
      storageClass: manual
      deleteClaim: false
  entityOperator:
    topicOperator: {}
    userOperator: {}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: transaction-created
  namespace: fintrack
  labels:
    strimzi.io/cluster: fintrack
spec:
  topicName: transaction.created
  partitions: 3
  replicas: 1

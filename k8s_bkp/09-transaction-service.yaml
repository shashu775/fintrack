apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-service
  namespace: fintrack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: transaction-service
  template:
    metadata:
      labels:
        app: transaction-service
    spec:
      containers:
        - name: transaction-service
          image: <your-registry>/transaction-service:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: postgresql://postgres:postgres@transaction-db:5432/transactions
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: fintrack-kafka-bootstrap:9092
          envFrom:
            - secretRef:
                name: fintrack-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: transaction-service
  namespace: fintrack
spec:
  selector:
    app: transaction-service
  ports:
    - port: 80
      targetPort: 8000

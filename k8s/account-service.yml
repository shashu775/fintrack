apiVersion: apps/v1
kind: StatefulSet
metadata: 
    name: account-db
    namespace: fintrack
spec:
    serviceName: account-db
    replicas: 1
    selector:
        matchLabels:
            app: account-db
    template:
        metadata:
            labels:
                app: account-db
        spec:
            containers:
            - name: account-db
              image: postgres:15
              ports:
              - containerPort: 5432
              envFrom:            
              - configMapRef:
                  name: account-db-config
              - secretRef:
                  name: account-db-secrets  
              volumeMounts:
              - name: account-db-storage
                mountPath: /var/lib/postgresql/data
              resources:
                requests:
                  memory: "512Mi"
                  cpu: "250m"
                limits:
                  memory: "1Gi"
                  cpu: "500m"
    volumeClaimTemplates:   
            - metadata:
                  name: account-db-storage
              spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                      requests:
                          storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
    name: account-db
    namespace: fintrack
spec:
    clusterIP: None
    selector:
        app: account-db
    ports:  
    - protocol: TCP
      port: 5432
---
apiVersion: v1
kind: Secret
metadata:
    name: account-db-secrets
    namespace: fintrack
type: Opaque
data:
    POSTGRES_USER: YWRtaW4=  # base64 for 'admin'
    POSTGRES_PASSWORD: cGFzc3dvcmQ=  # base64 for 'password'
---
apiVersion: v1
kind: ConfigMap
metadata:
    name: account-db-config
    namespace: fintrack
data:
    POSTGRES_DB: account    
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: account-db-pv
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /data/account-db
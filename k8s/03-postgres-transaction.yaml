apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: transaction-db
  namespace: fintrack
spec:
  serviceName: transaction-db
  replicas: 1
  selector:
    matchLabels:
      app: transaction-db
  template:
    metadata:
      labels:
        app: transaction-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: fintrack-secrets
          env:
            - name: POSTGRES_DB
              value: transactions
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: manual
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: transaction-db
  namespace: fintrack
spec:
  clusterIP: None
  selector:
    app: transaction-db
  ports:
    - port: 5432
      targetPort: 5432

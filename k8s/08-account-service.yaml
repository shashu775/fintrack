apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
  namespace: fintrack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: account-service
  template:
    metadata:
      labels:
        app: account-service
    spec:
      containers:
        - name: account-service
          image: <your-registry>/account-service:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: postgresql://postgres:postgres@account-db:5432/accounts
          envFrom:
            - secretRef:
                name: fintrack-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: account-service
  namespace: fintrack
spec:
  selector:
    app: account-service
  ports:
    - port: 80
      targetPort: 8000

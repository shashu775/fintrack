apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: fintrack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: <your-registry>/auth-service:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: fintrack-secrets
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: fintrack
spec:
  selector:
    app: auth-service
  ports:
    - port: 80
      targetPort: 8000
